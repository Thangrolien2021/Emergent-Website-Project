# Cloudflare Pages configuration
name = "emergent-website"
type = "javascript"
main = "functions/index.js"

# Build configuration
build = { command = "cd frontend && yarn build", cwd = "." }
env = { production = { routes = [{ pattern = "*", zone_name = "juliantees.shop" }] } }

# Environment variables (configure these in Cloudflare Pages dashboard)
# Required variables:
# - RESEND_API_KEY: Your Resend.com API key for email delivery
# - RECIPIENT_EMAIL: Email to receive contact form submissions
# - SENDER_EMAIL: Email address to send from (must be verified in Resend)

# Compatibility settings
compatibility_date = "2024-01-01"

[env.production]
route = "juliantees.shop"
